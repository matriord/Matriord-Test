<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Matriord Mind Matrix — LinkedIn-style Daily Game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z5EC0BEN49"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Z5EC0BEN49');
    </script>
  </head>
  <body>
    <header class="li-topbar">
      <div class="li-topbar-left">
        <button class="li-back" id="li-back" type="button" aria-label="Back">&#8592;</button>
        <h1 class="li-title">Matriord Mind Matrix</h1>
      </div>
      <div class="li-actions">
        <button class="li-reset" id="li-reset" type="button">Reset</button>
        <button class="li-help-btn" id="li-help-btn" type="button" aria-label="How to play">?</button>
        <div class="li-settings">
          <button class="li-settings-btn" id="li-settings-btn" type="button" aria-haspopup="true" aria-expanded="false">Settings <span class="li-caret">&#9662;</span></button>
          <div class="li-menu" id="li-menu" hidden>
            <button class="li-menu-item" id="li-menu-fullscreen" type="button">Fullscreen</button>
            <button class="li-menu-item" id="li-menu-help" type="button">How to play</button>
            <button class="li-menu-item" id="li-menu-reset" type="button">Restart puzzle</button>
          </div>
        </div>
      </div>
    </header>

    <main class="li-main">
      <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width=600 height=960 tabindex="-1"></canvas>
        <div id="unity-loading-bar">
          <div id="unity-logo"></div>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
        </div>
        <div id="unity-warning"> </div>
        <div id="unity-footer">
          <div id="unity-logo-title-footer"></div>
          <div id="unity-fullscreen-button"></div>
          <div id="unity-build-title">Matriord Mind Matrix</div>
        </div>
      </div>
    </main>

    <div class="li-modal" id="li-help-modal" hidden>
      <div class="li-modal-box" role="dialog" aria-modal="true" aria-labelledby="li-help-title">
        <h2 id="li-help-title">How to play</h2>
        <p>Matriord Mind Matrix is a quick daily brain teaser.</p>
        <ul>
          <li>Tap or click the tiles to make your moves.</li>
          <li>Clear the board to solve the puzzle.</li>
          <li>Use Reset to start the puzzle over.</li>
        </ul>
        <button class="li-modal-close" id="li-help-close" type="button">Got it</button>
      </div>
    </div>

    <script>
      // --- LinkedIn-style shell: back, reset, help modal, settings menu --
      (function () {
        var modal = document.getElementById("li-help-modal");
        var openBtn = document.getElementById("li-help-btn");
        var closeBtn = document.getElementById("li-help-close");
        var backBtn = document.getElementById("li-back");
        var resetBtn = document.getElementById("li-reset");
        var settingsBtn = document.getElementById("li-settings-btn");
        var menu = document.getElementById("li-menu");
        var menuHelp = document.getElementById("li-menu-help");
        var menuReset = document.getElementById("li-menu-reset");

        function openHelp() { modal.hidden = false; }
        function closeMenu() {
          menu.hidden = true;
          settingsBtn.setAttribute("aria-expanded", "false");
        }
        function reset() { location.reload(); }

        if (openBtn) openBtn.addEventListener("click", openHelp);
        if (closeBtn) closeBtn.addEventListener("click", function () { modal.hidden = true; });
        if (modal) modal.addEventListener("click", function (e) {
          if (e.target === modal) modal.hidden = true;
        });
        if (backBtn) backBtn.addEventListener("click", function () { history.back(); });
        // Reset reloads the build, restarting the puzzle from the top.
        if (resetBtn) resetBtn.addEventListener("click", reset);

        // Settings dropdown.
        if (settingsBtn) settingsBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          var open = menu.hidden;
          menu.hidden = !open;
          settingsBtn.setAttribute("aria-expanded", String(open));
        });
        if (menuHelp) menuHelp.addEventListener("click", function () { closeMenu(); openHelp(); });
        if (menuReset) menuReset.addEventListener("click", function () { reset(); });
        // Close the menu when clicking anywhere outside it.
        document.addEventListener("click", function (e) {
          if (!menu.hidden && !menu.contains(e.target) && e.target !== settingsBtn) closeMenu();
        });
        // Fullscreen item is wired once the Unity instance is ready (below).
      })();
    </script>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      // --- Touch input shim ---
      // On some Unity WebGL builds, touch input never reaches the game on
      // mobile: rendering and audio work, but the on-screen buttons are dead.
      // Unity does reliably handle mouse input, so translate each touch on the
      // canvas into the equivalent mouse event at the same coordinates. This
      // makes taps register as clicks. Harmless on desktop (no touch events).
      (function () {
        function fireMouse(type, touch) {
          canvas.dispatchEvent(new MouseEvent(type, {
            bubbles: true, cancelable: true, view: window,
            clientX: touch.clientX, clientY: touch.clientY,
            button: 0, buttons: type === "mouseup" ? 0 : 1
          }));
        }
        canvas.addEventListener("touchstart", function (e) {
          if (e.touches.length) { fireMouse("mousemove", e.touches[0]); fireMouse("mousedown", e.touches[0]); }
          e.preventDefault();
        }, { passive: false });
        canvas.addEventListener("touchmove", function (e) {
          if (e.touches.length) fireMouse("mousemove", e.touches[0]);
          e.preventDefault();
        }, { passive: false });
        canvas.addEventListener("touchend", function (e) {
          if (e.changedTouches.length) fireMouse("mouseup", e.changedTouches[0]);
          e.preventDefault();
        }, { passive: false });
        canvas.addEventListener("touchcancel", function (e) {
          if (e.changedTouches.length) fireMouse("mouseup", e.changedTouches[0]);
          e.preventDefault();
        }, { passive: false });
      })();

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WEB.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WEB.data",
        frameworkUrl: buildUrl + "/WEB.framework.js",
        codeUrl: buildUrl + "/WEB.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Chrononaut",
        productName: "Matriord Mind Matrix",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      // Single LinkedIn-style layout for every device: the stylesheet sizes
      // and centres the portrait board inside the page so it fits without
      // being clipped. Cap the pixel ratio at 2 so high-DPI phones don't
      // allocate an oversized WebGL framebuffer (a common cause of a black
      // screen on mobile GPUs while audio keeps playing).
      config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, 2);

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
                // Settings -> Fullscreen (wired now that the instance exists).
                var menuFs = document.getElementById("li-menu-fullscreen");
                var menu = document.getElementById("li-menu");
                var settingsBtn = document.getElementById("li-settings-btn");
                if (menuFs) menuFs.onclick = () => {
                  if (menu) menu.hidden = true;
                  if (settingsBtn) settingsBtn.setAttribute("aria-expanded", "false");
                  unityInstance.SetFullscreen(1);
                };

              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
